<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #f4f4f4; font-family: Arial, Helvetica, sans-serif; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { background: #1a237e; padding: 24px 32px; text-align: center; }
    .header h1 { margin: 0; color: #ffffff; font-size: 20px; }
    .content { padding: 32px; color: #333333; font-size: 15px; line-height: 1.6; }
    .footer { background: #f8f9fa; padding: 20px 32px; text-align: center; font-size: 12px; color: #666666; }
    .footer a { color: #1a237e; text-decoration: none; }
    .button { display: inline-block; padding: 12px 24px; background: #1a237e; color: #ffffff; text-decoration: none; border-radius: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{titulo}}</h1>
    </div>
    <div class="content">
      {{contenido}}
    </div>
    <div class="footer">
      <p>SIVA UNAHUR &mdash; Sistema de Acompa&ntilde;amiento de Alumnos Universitarios</p>
      <p>Este es un mensaje autom&aacute;tico, por favor no respondas a este correo.</p>
    </div>
  </div>
</body>
</html>
